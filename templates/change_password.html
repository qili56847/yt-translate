<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — VoiceOver Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #07070c;
  --bg-panel: #0e0e16;
  --bg-card: #141420;
  --border: #1e1e32;
  --text-primary: #e8e6f0;
  --text-secondary: #8886a0;
  --text-dim: #55536e;
  --text-label: #d8d6f0;
  --accent: #d4a039;
  --accent-glow: #e8b84d;
  --accent-dim: #9a7428;
  --green: #3dd68c;
  --red: #e05555;
}

[data-theme="light"] {
  --bg-deep: #f2f1f8;
  --bg-panel: #ffffff;
  --bg-card: #f8f7fc;
  --bg-elevated: #ededf5;
  --border: #d4d2e8;
  --border-glow: #c0bedd;
  --text-primary: #1a1820;
  --text-secondary: #4a4860;
  --text-dim: #6a6880;
  --text-label: #3d3b58;
}

html { font-size: 16px; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Noto Sans SC', 'JetBrains Mono', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lang-switcher {
  display: flex;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.lang-btn {
  padding: 7px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-label);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
}

.lang-btn:first-child { border-right: 1px solid var(--border); }

.lang-btn.active {
  color: var(--accent);
  background: rgba(212,160,57,0.08);
}

.lang-btn:hover:not(.active) {
  color: var(--text-secondary);
  background: rgba(255,255,255,0.03);
}

.card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  margin: 24px;
  position: relative;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
}

.brand {
  text-align: center;
  margin-bottom: 32px;
}

.brand .eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.brand h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--text-primary);
}

.error-msg {
  background: rgba(224,85,85,0.1);
  border: 1px solid rgba(224,85,85,0.3);
  color: var(--red);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.85rem;
  margin-bottom: 20px;
}

.success-msg {
  background: rgba(61,214,140,0.1);
  border: 1px solid rgba(61,214,140,0.3);
  color: var(--green);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.85rem;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-label);
  margin-bottom: 8px;
  font-family: 'Noto Sans SC', sans-serif;
}

.form-group input {
  width: 100%;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.form-group input:focus {
  border-color: var(--accent-dim);
  box-shadow: 0 0 0 3px rgba(212,160,57,0.08);
}

.password-hint {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 6px;
}

.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent-glow));
  color: var(--bg-deep);
  border: none;
  border-radius: 10px;
  padding: 13px 24px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}

.btn-submit:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(212,160,57,0.25);
}

.back-link {
  text-align: center;
  margin-top: 20px;
  font-size: 0.85rem;
}

.back-link a {
  color: var(--accent);
  text-decoration: none;
  transition: color 0.3s;
}

.back-link a:hover {
  color: var(--accent-glow);
}
</style>
</head>
<body>

<div style="position:fixed;top:20px;right:24px;z-index:10;display:flex;align-items:center;gap:8px;">
  <button id="themeToggle" onclick="toggleTheme()" style="padding:7px 12px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:500;color:var(--text-label);background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.3s;" title="Toggle theme">☀</button>
  <div class="lang-switcher">
    <button class="lang-btn" id="langZh" onclick="switchLang('zh')">CN</button>
    <button class="lang-btn" id="langEn" onclick="switchLang('en')">EN</button>
  </div>
</div>

<div class="card">
  <div class="brand">
    <div class="eyebrow">VoiceOver Studio</div>
    <h1 id="pageTitle">Change Password</h1>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="success-msg" id="msgSuccess"></div>
  {% endif %}

  <form method="POST">
    <div class="form-group">
      <label id="labelOldPwd">Current Password</label>
      <input type="password" name="old_password" required autocomplete="current-password" autofocus>
    </div>
    <div class="form-group">
      <label id="labelNewPwd">New Password</label>
      <input type="password" name="new_password" required autocomplete="new-password" minlength="8">
      <div class="password-hint" id="passwordHint">At least 8 characters, must include letters and digits</div>
    </div>
    <div class="form-group">
      <label id="labelConfirm">Confirm New Password</label>
      <input type="password" name="confirm" required autocomplete="new-password" minlength="8">
    </div>
    <button type="submit" class="btn-submit" id="btnSubmit">Update Password</button>
  </form>

  <div class="back-link">
    <a href="{{ url_for('index') }}" id="linkBack">Back to Home</a>
  </div>
</div>

<script>
// Theme
(function(){
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = saved === 'dark' ? '☀' : '🌙';
})();

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? '☀' : '🌙';
}

const I18N = {
  zh: {
    pageTitle:    '修改密码',
    labelOldPwd:  '当前密码',
    labelNewPwd:  '新密码',
    labelConfirm: '确认新密码',
    passwordHint: '至少8位，需包含字母和数字',
    btnSubmit:    '更新密码',
    linkBack:     '返回首页',
    msgSuccess:   '密码修改成功！',
  },
  en: {
    pageTitle:    'Change Password',
    labelOldPwd:  'Current Password',
    labelNewPwd:  'New Password',
    labelConfirm: 'Confirm New Password',
    passwordHint: 'At least 8 characters, must include letters and digits',
    btnSubmit:    'Update Password',
    linkBack:     'Back to Home',
    msgSuccess:   'Password changed successfully!',
  },
};

let currentLang = localStorage.getItem('lang') || 'zh';

function t(key) { return I18N[currentLang][key] || I18N['en'][key] || key; }

function applyLang() {
  document.getElementById('langZh').classList.toggle('active', currentLang === 'zh');
  document.getElementById('langEn').classList.toggle('active', currentLang === 'en');

  document.getElementById('pageTitle').textContent = t('pageTitle');
  document.getElementById('labelOldPwd').textContent = t('labelOldPwd');
  document.getElementById('labelNewPwd').textContent = t('labelNewPwd');
  document.getElementById('labelConfirm').textContent = t('labelConfirm');
  document.getElementById('passwordHint').textContent = t('passwordHint');
  document.getElementById('btnSubmit').textContent = t('btnSubmit');
  document.getElementById('linkBack').textContent = t('linkBack');

  const msgSuccess = document.getElementById('msgSuccess');
  if (msgSuccess) msgSuccess.textContent = t('msgSuccess');

  localStorage.setItem('lang', currentLang);
}

function switchLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  applyLang();
}

applyLang();
</script>

</body>
</html>
